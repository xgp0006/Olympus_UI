name: Build

on:
  push:
    branches: [master]
  # No branches filter on pull_request so stacked PRs (those targeting a
  # feature branch rather than master directly) also trigger CI. Without
  # this, mid-stack PRs land with no validation until they reach the top
  # of the stack — defeats the purpose of CI on every change.
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.11.0"
  PNPM_VERSION: "9.15.9"

# Initial mode: ALL substantive gates report-only.
#
# The codebase has multiple pre-existing failures documented in
# docs/compliance/baseline.md, including:
#   - 331 prettier-unformatted files
#   - 4408 ESLint errors + 1724 warnings (1456 auto-fixable)
#   - 87 TypeScript / svelte-check errors
#   - vite build fails on a missing component (`../ui/ConnectionStatus.svelte`
#     imported by `App.svelte` but the file doesn't exist; tracked as a
#     known build blocker in baseline.md)
#
# The only blocking step is `pnpm install --frozen-lockfile` — that's the
# minimum reproducibility check; if even installation fails, nothing
# downstream can be validated. Once Phase 2 drives the baselines to zero
# (and the missing component is restored or its imports removed), the
# continue-on-error flags come off in order: build → typecheck → lint →
# format. Each transition is a separate PR with the relevant baseline
# row marked closed.
#
# Tauri desktop build is intentionally NOT here — that's a release
# concern (separate release.yml on tag push), not a per-push gate.
jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        # Reads pnpm version from package.json's `packageManager` field —
        # single source of truth for the version, which also matches
        # .mise.toml. No version: override here on purpose.
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Prettier format check (report-only)
        continue-on-error: true
        run: |
          set -euo pipefail
          pnpm exec prettier --check .

      - name: ESLint (report-only)
        continue-on-error: true
        run: |
          set -euo pipefail
          pnpm exec eslint .

      - name: TypeScript / Svelte check (report-only)
        continue-on-error: true
        run: |
          set -euo pipefail
          pnpm check

      - name: Vite build (report-only — known broken via missing component)
        continue-on-error: true
        run: |
          set -euo pipefail
          pnpm build
